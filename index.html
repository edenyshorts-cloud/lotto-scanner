<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 제외 번호 추출기</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f5f5f5; padding: 20px; }
        #reader { max-width: 500px; margin: 0 auto; background: white; border-radius: 8px; padding: 10px; }
        #result-container { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; display: none; }
        .num-box { display: inline-block; width: 30px; height: 30px; line-height: 30px; margin: 3px; background: #3498db; color: white; border-radius: 50%; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🎰 로또 제외 번호 추출기</h1>
    <p>로또 용지의 QR 코드를 카메라에 보여주세요.</p>
    
    <div id="reader"></div>

    <div id="result-container">
        <h2 id="round-info"></h2>
        <h3>선택된 번호 목록</h3>
        <div id="selected-numbers"></div>
        <hr>
        <h3 style="color: #e74c3c;">선택되지 않은 번호 (총 <span id="missing-count">0</span>개)</h3>
        <div id="missing-numbers"></div>
    </div>

    <script>
        // 1부터 45까지 전체 번호 세트 생성 함수
        const getAllNumbers = () => Array.from({length: 45}, (_, i) => i + 1);

        // QR 코드 인식 성공 시 실행될 콜백 함수
        function onScanSuccess(decodedText) {
            // 동행복권 URL 검증
            if (!decodedText.includes("dhlottery.co.kr")) {
                alert("올바른 동행복권 QR 코드가 아닙니다.");
                return;
            }

            // URL에서 쿼리 스트링(v=...) 부분만 추출
            const urlParams = new URLSearchParams(decodedText.split('?')[1]);
            const vData = urlParams.get('v');

            if (!vData) return;

            // 회차 및 게임 데이터 분리
            const round = parseInt(vData.substring(0, 4)); // 앞 4자리 회차
            const gamesData = vData.substring(4); // 나머지 게임 데이터 (예: m010203...)

            // 2자리씩 끊어서 숫자를 추출하되, 구분자 'm'이나 'q' 등 숫자가 아닌 것은 제외
            const matches = gamesData.match(/\d{2}/g);
            if (!matches) return;

            // 중복 제거를 위해 Set 객체 활용 (선택된 번호들)
            const selectedNumbers = new Set(matches.map(num => parseInt(num)));

            // 없는 번호 계산 (차집합)
            const allNumbers = getAllNumbers();
            const missingNumbers = allNumbers.filter(num => !selectedNumbers.has(num));

            // 화면에 결과 렌더링
            document.getElementById("round-info").innerText = `${round}회차 로또 분석 결과`;
            
            // 선택된 번호 출력
            document.getElementById("selected-numbers").innerHTML = 
                Array.from(selectedNumbers).sort((a,b)=>a-b).map(n => `<span class="num-box" style="background:#2ecc71;">${n}</span>`).join('');
            
            // 없는 번호 출력
            document.getElementById("missing-count").innerText = missingNumbers.length;
            document.getElementById("missing-numbers").innerHTML = 
                missingNumbers.map(n => `<span class="num-box">${n}</span>`).join('');

            document.getElementById("result-container").style.display = "block";
        }

        // QR 스캐너 초기화 및 시작 (fps: 초당 프레임 수, qrbox: 스캔 테두리 크기)
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
